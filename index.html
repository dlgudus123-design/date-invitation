<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>데이트 신청</title>
<style>
body{margin:0;font-family:Arial;background:linear-gradient(#ffd6e7,#fff);overflow:hidden;display:flex;justify-content:center;align-items:center;height:100vh}
.card{background:#fff;padding:30px;border-radius:20px;box-shadow:0 10px 30px rgba(0,0,0,.15);width:min(90%,420px);text-align:center;position:relative;z-index:2}
button{padding:12px 24px;border:none;border-radius:30px;font-size:18px;cursor:pointer;margin:10px}
#yes{background:#ff4f8b;color:#fff} #no{background:#ddd;position:relative}
input{width:90%;padding:10px;margin:8px;border-radius:10px;border:1px solid #ccc}
.heart{position:fixed;top:-20px;color:#ff5b9a;animation:fall linear forwards}
@keyframes fall{to{transform:translateY(110vh);opacity:0}}
</style></head>
<body>
<div class="card" id="card">
<h1>💕 나랑 데이트할래? 💕</h1>
<button id="yes">YES ❤️</button>
<button id="no">NO 🙈</button>
</div>
<script>
setInterval(()=>{
 let h=document.createElement("div");
 h.className="heart";h.textContent="❤";
 h.style.left=Math.random()*100+"vw";
 h.style.fontSize=(15+Math.random()*20)+"px";
 h.style.animationDuration=(4+Math.random()*4)+"s";
 document.body.appendChild(h);
 setTimeout(()=>h.remove(),8000);
},300);

const no=document.getElementById("no");
no.addEventListener("mouseover",()=>{
 const x=(Math.random()*200)-100;
 const y=(Math.random()*120)-60;
 no.style.transform=`translate(${x}px,${y}px)`;
});

document.getElementById("yes").onclick=()=>{
 document.getElementById("card").innerHTML=`
 <h2>🥰 너무 좋아!!<br>나랑 데이트가 하고 싶었구나?!!</h2>
 <p>📅 날짜</p><input type="date" id="d">
 <p>🕒 시간</p><input type="time" id="t">
 <p>📍 가고 싶은 곳</p><input id="p" placeholder="예: 한강">
 <p>🍝 먹고 싶은 메뉴</p><input id="m" placeholder="예: 삼겹살">
 <br><button id="done">데이트 신청 완료❤️</button>`;
 document.getElementById("done").onclick=()=>{
  const d=document.getElementById("d").value;
  const t=document.getElementById("t").value;
  const p=document.getElementById("p").value;
  const m=document.getElementById("m").value;
  document.getElementById("card").innerHTML=
  `<h2>💖 우리 데이트 약속 완료! 💖</h2>
  <p><b>날짜:</b> ${d}</p>
  <p><b>시간:</b> ${t}</p>
  <p><b>장소:</b> ${p}</p>
  <p><b>메뉴:</b> ${m}</p>
  <h3>기다리고 있을게 🥰</h3>`;
 };
};
</script></body></html>
