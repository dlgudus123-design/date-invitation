<!DOCTYPE html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>데이트 신청</title><style>body{margin:0;font-family:Arial;background:linear-gradient(#ffd6e7,#fff);overflow:hidden}.wrap{display:flex;justify-content:center;align-items:center;height:100vh}.card{background:#fff;padding:25px;border-radius:20px;box-shadow:0 8px 25px rgba(0,0,0,.15);width:min(90%,420px);text-align:center}button{padding:12px 22px;border:none;border-radius:25px;margin:8px;cursor:pointer}#yes{background:#ff4f8b;color:#fff}#no{background:#ddd;position:relative}input{width:90%;padding:10px;margin:5px}</style></head><body><div class="wrap"><div class="card" id="card"><h1>💕 나랑 데이트할래? 💕</h1><button id="yes">YES</button><button id="no">NO</button></div></div><script>no.onmouseover=()=>{no.style.transform=`translate(${Math.random()*200-100}px,${Math.random()*100-50}px)`};yes.onclick=()=>{card.innerHTML=`<h2>🥰 너무 좋아!!</h2><input id=d type=date><input id=t type=time><input id=p placeholder="장소"><input id=m placeholder="메뉴"><br><button id=done>완료❤️</button>`;done.onclick=()=>{let f=new FormData();f.append("entry.943314033",d.value);f.append("entry.1197607824",t.value);f.append("entry.1205054837",p.value);f.append("entry.1946072490",m.value);fetch("https://docs.google.com/forms/d/e/1FAIpQLSdedNEdEng1MBB0NOt1YydtcDUDp5gRYzgY_CBXWQRyKjk5Hw/formResponse",{method:"POST",mode:"no-cors",body:f});card.innerHTML=`<h2>💖 데이트 약속 완료!</h2><p>${d.value}<br>${t.value}<br>${p.value}<br>${m.value}</p>`}}</script></body></html>
